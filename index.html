<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SENHA</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
}

/* vídeo fundo */

#bgvideo{
position:fixed;
top:50%;
left:50%;
width:177.77vh;
height:100vh;
min-width:100%;
min-height:56.25vw;
transform:translate(-50%,-50%);
pointer-events:none;
z-index:-2;
}

/* camada escura */

.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.55);
z-index:-1;
}

/* tela */

.tela{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
text-align:center;
}

h1{
color:white;
font-size:75px;
letter-spacing:7px;
font-family:Impact;
margin-bottom:30px;
}

input{
background:black;
border:2px solid white;
color:white;
padding:15px;
width:280px;
font-size:20px;
outline:none;
}

button{
background:black;
border:2px solid white;
color:white;
padding:15px 45px;
margin-top:25px;
font-size:20px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:white;
color:black;
}

#erro{
color:white;
margin-top:18px;
font-size:16px;
letter-spacing:2px;
}

</style>
</head>

<body>

<iframe
id="bgvideo"
src="https://www.youtube.com/embed/SYyFoIWygEs?autoplay=1&mute=1&controls=0&loop=1&playlist=SYyFoIWygEs"
frameborder="0"
allow="autoplay"
allowfullscreen>
</iframe>

<div class="overlay"></div>

<div class="tela">

<h1>SENHA</h1>

<input type="password" id="senha">

<br>

<button onclick="entrar()">ENTRAR</button>

<p id="erro"></p>

</div>

<script>

function entrar(){

let senha = document.getElementById("senha").value.toUpperCase();

if(senha === "AGUA"){

window.location.href = "https://drive.google.com/drive/folders/17I4q2_bfSuiQV57MC5bckdwsdJ61oFLX?usp=drive_link";

}

else if(senha === "GELO"){

window.location.href = "https://drive.google.com/drive/folders/1cqlVOE_6xtUALwW_ROno5ehmnHDLj53P?usp=drive_link";

}

else if(senha === "PLANTA"){

window.location.href = "https://drive.google.com/drive/folders/1FAoDE-XKcLuGaC7RI76O2Gm5h4C7pcNb?usp=drive_link";

}

else{

document.getElementById("erro").innerText = "SENHA INCORRETA";

}

}
