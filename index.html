<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>SENHA</title>

<style>

body{
background:black;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:Arial;
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:100%;
height:100%;
background-image:
linear-gradient(transparent 95%, rgba(255,255,255,0.04) 100%),
linear-gradient(90deg, transparent 95%, rgba(255,255,255,0.04) 100%);
background-size:4px 4px;
opacity:0.2;
pointer-events:none;
}

.tela{
position:relative;
text-align:center;
z-index:2;
}

h1{
color:white;
font-size:75px;
letter-spacing:7px;
font-family:Impact;
transform:rotate(-2deg);
margin-bottom:30px;
}

input{
background:black;
border:2px solid white;
color:white;
padding:15px;
width:280px;
font-size:20px;
outline:none;
}

button{
background:black;
border:2px solid white;
color:white;
padding:15px 45px;
margin-top:25px;
font-size:20px;
cursor:pointer;
transition:0.2s;
}

button:hover{
background:white;
color:black;
}

#erro{
color:white;
margin-top:18px;
font-size:16px;
letter-spacing:2px;
}

</style>
</head>

<body>

<div class="tela">

<h1>SENHA</h1>

<input type="password" id="senha">

<br>

<button onclick="entrar()">ENTRAR</button>

<p id="erro"></p>

</div>

<script>

function entrar(){

let senha = document.getElementById("senha").value.toUpperCase();

if(senha === "AGUA"){

window.location.href = "https://drive.google.com/drive/folders/17I4q2_bfSuiQV57MC5bckdwsdJ61oFLX?usp=drive_link";

}

else if(senha === "GELO"){

window.location.href = "https://drive.google.com/drive/folders/1cqlVOE_6xtUALwW_ROno5ehmnHDLj53P?usp=drive_link";

}

else if(senha === "PLANTA"){

window.location.href = "https://drive.google.com/drive/folders/1FAoDE-XKcLuGaC7RI76O2Gm5h4C7pcNb?usp=drive_link";

}

else{

document.getElementById("erro").innerText = "SENHA INCORRETA";

}

}

</script>

</body>
</html>
